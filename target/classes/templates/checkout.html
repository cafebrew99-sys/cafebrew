<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafebrew - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="mesh-bg-1 min-vh-100 cart-page-bg">

    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-cup-hot-fill text-accent"></i> CafeBrew
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0" id="mainNav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cart">Cart <span id="cartCountBadge" class="badge bg-accent text-dark rounded-pill">0</span></a></li>
                </ul>
                <div class="d-flex" id="authSection"></div>
            </div>
        </div>
    </nav>

    <section class="py-5 pt-8 mt-5">
        <div class="container">
            <h2 class="text-white mb-4"><i class="bi bi-wallet2 text-accent"></i> Secure Checkout</h2>
            
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4">
                        <h4 class="text-white mb-4">Shipping Details</h4>
                        <div id="checkoutAlert" class="alert d-none" role="alert"></div>
                        <form id="checkoutForm">
                            <div class="form-floating mb-3 custom-form-floating">
                                <textarea class="form-control glass-input" id="shippingAddress" placeholder="Address" style="height: 100px" required></textarea>
                                <label for="shippingAddress">Full Shipping Address</label>
                            </div>

                            <h4 class="text-white mt-5 mb-3">Payment Method</h4>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="payCOD" value="COD" checked>
                                <label class="form-check-label text-light-muted" for="payCOD">
                                    Cash on Delivery
                                </label>
                            </div>


                            <button type="submit" class="btn btn-accent w-100 py-3 rounded-pill fw-bold">Place Order</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Checkout Popup Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white border-secondary">
                <div class="modal-header border-secondary text-center">
                    <h5 class="modal-title w-100" id="checkoutModalTitle">Notification</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-5">
                    <i class="bi bi-info-circle text-accent" style="font-size: 3rem;"></i>
                    <p class="mt-4 lead" id="checkoutModalMessage">Processing...</p>
                </div>
                <div class="modal-footer border-secondary justify-content-center">
                    <button type="button" class="btn btn-accent rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
