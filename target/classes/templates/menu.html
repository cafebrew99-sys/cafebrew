<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafebrew - Menu</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="mesh-bg-1 min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container py-1">
            <a class="navbar-brand fw-bold fs-3 text-white" href="/">
                <i class="bi bi-cup-hot-fill text-accent me-2"></i> Cafe<span class="text-accent">Brew</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <i class="bi bi-list text-white fs-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link px-3" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active px-3" href="/menu">Menu</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="/cart">Cart <span id="cartCountBadge" class="badge bg-accent text-dark rounded-pill">0</span></a></li>
                </ul>
                <div class="d-flex" id="authSection">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Menu Section -->
    <section class="py-5 pt-8 mt-5">
        <div class="container py-4">
            <div class="text-center mb-5 text-white">
                <h1 class="display-3 fw-bold">Our <span class="text-accent">Menu</span></h1>
                <div class="mt-2 mx-auto bg-accent" style="height: 3px; width: 60px; border-radius: 2px;"></div>
                <p class="lead mt-3 text-muted">A symphony of flavors, hand-poured and freshly baked.</p>
            </div>
            
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(categorizedProducts)}" class="text-center text-muted py-5">
                <i class="bi bi-cup-straw" style="font-size:4rem; opacity: 0.3;"></i>
                <p class="mt-3 fs-5">Our chefs are preparing something special. Check back soon!</p>
            </div>

            <!-- Category groups -->
            <div th:each="categoryEntry : ${categorizedProducts}" 
                 th:class="'category-bg-wrapper bg-' + ${#strings.toLowerCase(#strings.replace(categoryEntry.key.name, ' ', '-'))}">
                <div class="container">
                <div class="d-flex align-items-center gap-3 mb-5 mt-5">
                    <div class="p-3 glass-card rounded-circle d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i th:class="'bi ' + ${categoryEntry.key.icon} + ' text-accent fs-4'"></i>
                    </div>
                    <div>
                        <h2 class="text-white fw-bold mb-0 h3" th:text="${categoryEntry.key.name}">Category</h2>
                        <small class="text-muted" th:text="${categoryEntry.key.description}">Description</small>
                    </div>
                    <hr class="flex-grow-1 border-white" style="opacity: 0.1;">
                </div>
                
                <div class="row g-4">
                    <div class="col-md-6 col-lg-4" th:each="product : ${categoryEntry.value}">
                        <div class="glass-product-card card-3d d-flex flex-column h-100">
                            <div class="product-image-container">
                                <img th:src="@{${product.imageUrl}}" class="img-fluid w-100" th:alt="${product.name}" onerror="this.src='/images/placeholder.jpg'" style="object-fit:cover;height:240px;">
                                <span class="category-badge" th:text="${categoryEntry.key.name}">CATEGORY</span>
                            </div>
                            <div class="p-4 d-flex flex-column flex-grow-1">
                                <h4 class="text-white mb-2 fw-bold" th:text="${product.name}">Product Name</h4>
                                <p class="text-muted small flex-grow-1" th:text="${product.description}">Description</p>
                                <div class="d-flex justify-content-between align-items-center mt-4">
                                    <span class="h4 text-accent mb-0 fw-bold" th:text="'₹' + ${product.price}">₹0.00</span>
                                    <button class="btn btn-accent rounded-pill px-4" 
                                            th:data-id="${product.id}"
                                            th:data-name="${product.name}"
                                            th:data-price="${product.price}"
                                            onclick="addToCart(this.getAttribute('data-id'), this.getAttribute('data-name'), this.getAttribute('data-price'))">
                                        <i class="bi bi-plus-lg me-1"></i> Add
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 text-center text-muted border-top border-secondary mt-5" style="background: rgba(0,0,0,0.3)">
        <p>© 2026 CafeBrew Artisan Experience. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
