<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeBrew - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-icon { font-size: 2.5rem; }
        .chart-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; }
        .filter-btn.active { background: var(--accent-gold, #cbb26a) !important; color: #111 !important; border-color: var(--accent-gold, #cbb26a) !important; }
        .order-item-details { background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 0.85rem; }
        .nav-pills .nav-link { color: #ccc; }
        .nav-pills .nav-link.active { background: var(--accent-gold, #cbb26a); color: #111; font-weight: 600; }
        .category-section-header { background: rgba(203,178,106,0.1); border-left: 3px solid var(--accent-gold); border-radius: 0 8px 8px 0; padding: 8px 16px; margin: 16px 0 8px; }
        .glass-input option { background: #0a0b0e; color: #fff; }
    </style>
</head>
<body class="mesh-bg-1 min-vh-100 admin-page-bg">

    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container-fluid px-5">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shield-lock-fill text-accent"></i> CafeBrew <span class="text-light fs-6">Admin Panel</span>
            </a>
            <div class="d-flex gap-2" id="authSection"></div>
        </div>
    </nav>

    <section class="container-fluid px-4 py-5 mt-5">

        <!-- KPI Stats Row -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <span class="stat-icon text-warning"><i class="bi bi-hourglass-split"></i></span>
                        <div><p class="text-muted mb-0 small">Pending</p><h3 class="text-white mb-0" id="kpiPending">—</h3></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <span class="stat-icon text-success"><i class="bi bi-check-circle-fill"></i></span>
                        <div><p class="text-muted mb-0 small">Delivered</p><h3 class="text-white mb-0" id="kpiDelivered">—</h3></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <span class="stat-icon text-danger"><i class="bi bi-x-circle-fill"></i></span>
                        <div><p class="text-muted mb-0 small">Cancelled</p><h3 class="text-white mb-0" id="kpiCancelled">—</h3></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <span class="stat-icon text-accent"><i class="bi bi-currency-rupee"></i></span>
                        <div><p class="text-muted mb-0 small">Total Revenue</p><h3 class="text-white mb-0" id="kpiRevenue">—</h3></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <ul class="nav nav-pills mb-4 gap-2" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active rounded-pill px-4" id="products-tab" data-bs-toggle="pill" data-bs-target="#products" type="button">
                    <i class="bi bi-grid-fill me-1"></i> Manage Products
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link rounded-pill px-4" id="categories-tab" data-bs-toggle="pill" data-bs-target="#categories" type="button">
                    <i class="bi bi-tags-fill me-1"></i> Categories
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link rounded-pill px-4" id="orders-tab" data-bs-toggle="pill" data-bs-target="#orders" type="button">
                    <i class="bi bi-receipt me-1"></i> Live Orders
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link rounded-pill px-4" id="analytics-tab" data-bs-toggle="pill" data-bs-target="#analytics" type="button">
                    <i class="bi bi-bar-chart-fill me-1"></i> Analytics
                </button>
            </li>
        </ul>

        <div class="tab-content glass-card p-4" id="adminTabContent">

            <!-- ===== Products Tab ===== -->
            <div class="tab-pane fade show active" id="products" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                    <h4 class="text-white mb-0"><i class="bi bi-cup-straw text-accent me-2"></i>Menu Inventory</h4>
                    <button class="btn btn-accent rounded-pill" data-bs-toggle="modal" data-bs-target="#addProductModal">
                        <i class="bi bi-plus-lg"></i> Add New Product
                    </button>
                </div>
                <!-- Category-grouped products injected by JS -->
                <div id="adminProductsGrouped"></div>
            </div>

            <!-- ===== Categories Tab ===== -->
            <div class="tab-pane fade" id="categories" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                    <h4 class="text-white mb-0"><i class="bi bi-tags-fill text-accent me-2"></i>Food Categories</h4>
                    <button class="btn btn-accent rounded-pill" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                        <i class="bi bi-plus-lg"></i> Add Category
                    </button>
                </div>
                <div class="row g-3" id="categoriesGrid"></div>
            </div>

            <!-- ===== Orders Tab ===== -->
            <div class="tab-pane fade" id="orders" role="tabpanel">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3 gap-3">
                    <h4 class="text-white mb-0"><i class="bi bi-receipt-cutoff text-accent me-2"></i>Customer Orders</h4>
                    <div class="d-flex gap-2 flex-wrap" id="adminOrderFilters">
                        <button class="btn btn-sm btn-outline-light rounded-pill filter-btn active" data-filter="ALL">All</button>
                        <button class="btn btn-sm btn-outline-warning rounded-pill filter-btn" data-filter="PENDING">Pending</button>
                        <button class="btn btn-sm btn-outline-info rounded-pill filter-btn" data-filter="PREPARING">Preparing</button>
                        <button class="btn btn-sm btn-outline-primary rounded-pill filter-btn" data-filter="OUT_FOR_DELIVERY">Out for Delivery</button>
                        <button class="btn btn-sm btn-outline-success rounded-pill filter-btn" data-filter="DELIVERED">Delivered</button>
                        <button class="btn btn-sm btn-outline-danger rounded-pill filter-btn" data-filter="CANCELLED">Cancelled</button>
                    </div>
                </div>
                <div id="adminOrdersContainer"></div>
            </div>

            <!-- ===== Analytics Tab ===== -->
            <div class="tab-pane fade" id="analytics" role="tabpanel">
                <h4 class="text-white mb-4 border-bottom border-secondary pb-3"><i class="bi bi-graph-up-arrow text-accent me-2"></i>Business Analytics</h4>
                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="chart-card">
                            <h6 class="text-light-muted mb-3"><i class="bi bi-pie-chart-fill text-accent me-2"></i>Orders by Status</h6>
                            <canvas id="statusPieChart" height="250"></canvas>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="chart-card">
                            <h6 class="text-light-muted mb-3"><i class="bi bi-bar-chart-fill text-accent me-2"></i>Revenue by Payment Method</h6>
                            <canvas id="revenueBarChart" height="120"></canvas>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="chart-card">
                            <h6 class="text-light-muted mb-3"><i class="bi bi-graph-up text-accent me-2"></i>Order Volume Over Time</h6>
                            <canvas id="ordersTrendChart" height="80"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white" style="border: 1px solid var(--glass-border)">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-plus-circle text-accent me-2"></i>Add New Product</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="mb-3"><label class="form-label text-light-muted">Name</label><input type="text" class="form-control glass-input" id="pName" required></div>
                        <div class="mb-3"><label class="form-label text-light-muted">Description</label><textarea class="form-control glass-input" id="pDesc" rows="2" required></textarea></div>
                        <div class="mb-3"><label class="form-label text-light-muted">Price (₹)</label><input type="number" step="0.01" class="form-control glass-input" id="pPrice" required></div>
                        <div class="mb-3">
                            <label class="form-label text-light-muted">Category</label>
                            <select class="form-select glass-input" id="pCategoryId" required></select>
                        </div>
                        <div class="mb-3"><label class="form-label text-light-muted">Image URL (optional)</label><input type="text" class="form-control glass-input" id="pImageUrl"></div>
                        <button type="submit" class="btn btn-accent w-100 rounded-pill">Save Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white" style="border: 1px solid var(--glass-border)">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-pencil-square text-accent me-2"></i>Edit Product</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editProductForm">
                        <input type="hidden" id="editProductId">
                        <div class="mb-3"><label class="form-label text-light-muted">Name</label><input type="text" class="form-control glass-input" id="editPName" required></div>
                        <div class="mb-3"><label class="form-label text-light-muted">Description</label><textarea class="form-control glass-input" id="editPDesc" rows="2" required></textarea></div>
                        <div class="mb-3"><label class="form-label text-light-muted">Price (₹)</label><input type="number" step="0.01" class="form-control glass-input" id="editPPrice" required></div>
                        <div class="mb-3">
                            <label class="form-label text-light-muted">Category</label>
                            <select class="form-select glass-input" id="editPCategoryId" required></select>
                        </div>
                        <div class="mb-3"><label class="form-label text-light-muted">Image URL (optional)</label><input type="text" class="form-control glass-input" id="editPImageUrl"></div>
                        <button type="submit" class="btn btn-accent w-100 rounded-pill">Update Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white" style="border: 1px solid var(--glass-border)">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-tags-fill text-accent me-2"></i>Add Category</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCategoryForm">
                        <div class="mb-3"><label class="form-label text-light-muted">Category Name</label><input type="text" class="form-control glass-input" id="catName" required></div>
                        <div class="mb-3"><label class="form-label text-light-muted">Description</label><input type="text" class="form-control glass-input" id="catDesc"></div>
                        <div class="mb-3">
                            <label class="form-label text-light-muted">Icon (Bootstrap Icon class)</label>
                            <input type="text" class="form-control glass-input" id="catIcon" placeholder="e.g. bi-cup-hot-fill">
                            <div class="mt-2"><small class="text-muted">Preview: </small><i id="catIconPreview" class="bi bi-tag-fill text-accent ms-2" style="font-size:1.2rem"></i></div>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 rounded-pill">Save Category</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Cancellation Reason Modal (Generic for Admin/Customer) -->
    <div class="modal fade" id="cancelOrderModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white border-danger shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-x-circle-fill text-danger me-2"></i>Admin Order Cancellation</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="cancelOrderId">
                    <div class="mb-3">
                        <label class="form-label text-light-muted">Reason for Cancellation</label>
                        <select class="form-select glass-input text-white" id="cancelReasonSelect" required>
                            <!-- Reasons populated by JS based on role -->
                        </select>
                    </div>
                    <div class="mb-3 d-none" id="customReasonContainer">
                        <label class="form-label text-light-muted">Please specify</label>
                        <textarea class="form-control glass-input" id="customReasonText" rows="2" placeholder="Tell us more..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-sm btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-sm btn-danger rounded-pill px-4" id="confirmCancelBtn">Confirm Cancellation</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
