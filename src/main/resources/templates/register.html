<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeBrew - Register</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Outfit:wght@300;400;600;700&swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="mesh-bg-1 min-vh-100 d-flex align-items-center auth-bg">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="glass-card p-5 form-container card-3d">
                    <div class="text-center mb-4">
                        <a href="/" class="text-decoration-none">
                            <h2 class="fw-bold text-white"><i class="bi bi-cup-hot-fill text-accent"></i> CafeBrew</h2>
                        </a>
                        <p class="text-light-muted">Join the Brew family.</p>
                    </div>

                    <div id="authAlert" class="alert d-none" role="alert"></div>

                    <form id="registerForm">
                        <div class="form-floating mb-3 custom-form-floating">
                            <input type="text" class="form-control glass-input" id="reg-username" placeholder="Username" required>
                            <label for="reg-username">Username</label>
                        </div>
                        <div class="form-floating mb-4 custom-form-floating">
                            <input type="password" class="form-control glass-input" id="reg-password" placeholder="Password" required>
                            <label for="reg-password">Password</label>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-3 rounded-pill fw-bold">Sign Up</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-light-muted">Already have an account? <a href="/login" class="text-accent text-decoration-none fw-bold">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
