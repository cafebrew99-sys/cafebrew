<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafebrew - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="mesh-bg-1 min-vh-100 cart-page-bg">

    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-cup-hot-fill text-accent"></i> CafeBrew
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0" id="mainNav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/cart">Cart <span id="cartCountBadge" class="badge bg-accent text-dark rounded-pill">0</span></a></li>
                </ul>
                <div class="d-flex" id="authSection"></div>
            </div>
        </div>
    </nav>

    <section class="py-5 pt-8 mt-5">
        <div class="container">
            <h2 class="text-white mb-4"><i class="bi bi-cart3 text-accent"></i> Your Cart</h2>
            
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4" id="cartItemsContainer">
                        <!-- Items injected by JS -->
                        <p class="text-light-muted text-center py-5">Your cart is empty.</p>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="glass-card p-4">
                        <h4 class="text-white border-bottom border-secondary pb-3 mb-3">Order Summary</h4>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-light-muted">Subtotal</span>
                            <span class="text-white fw-bold" id="cartSubtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="text-light-muted">Shipping</span>
                            <span class="text-white fw-bold">Free</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 pb-3 border-bottom border-secondary">
                            <span class="text-white h5 mb-0">Total</span>
                            <span class="text-accent h5 mb-0" id="cartTotal">$0.00</span>
                        </div>
                        <a href="/checkout" class="btn btn-accent w-100 py-3 rounded-pill fw-bold" id="checkoutBtn">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
