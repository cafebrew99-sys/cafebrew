<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeBrew - My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .order-status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .order-card { border: 1px solid var(--glass-border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; background: var(--glass-surface); transition: all 0.3s ease; }
        .order-card:hover { border-color: var(--accent-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .order-item-row { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 6px 12px; margin: 4px 0; font-size: 0.85rem; }
        .filter-btn.active { background: var(--accent-gold) !important; color: #111 !important; border-color: var(--accent-gold) !important; }
        .cancelled-card { border-color: rgba(220, 53, 69, 0.3) !important; }
        .delivered-card { border-color: rgba(25, 135, 84, 0.3) !important; }
    </style>
</head>
<body class="mesh-bg-1 min-vh-100 orders-page-bg">

    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-cup-hot-fill text-accent"></i> CafeBrew
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cart">Cart <span id="cartCountBadge" class="badge bg-accent text-dark rounded-pill">0</span></a></li>
                </ul>
                <div class="d-flex" id="authSection"></div>
            </div>
        </div>
    </nav>

    <section class="py-5 pt-8 mt-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-white mb-0"><i class="bi bi-box-seam text-accent me-2"></i>My Orders</h2>
            </div>

            <!-- Filter Buttons -->
            <div class="d-flex gap-2 flex-wrap mb-4">
                <button class="btn btn-sm btn-outline-light rounded-pill filter-btn active" data-filter="ALL">All Orders</button>
                <button class="btn btn-sm btn-outline-warning rounded-pill filter-btn" data-filter="PENDING">Pending</button>
                <button class="btn btn-sm btn-outline-success rounded-pill filter-btn" data-filter="DELIVERED">Delivered</button>
                <button class="btn btn-sm btn-outline-danger rounded-pill filter-btn" data-filter="CANCELLED">Cancelled</button>
            </div>

            <div class="row g-4 justify-content-center">
                <div class="col-lg-10">
                    <div id="ordersContainer">
                        <div class="text-center py-5 glass-card">
                            <div class="spinner-border text-accent" role="status"></div>
                            <p class="text-light-muted mt-2">Loading orders...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Cancellation Reason Modal -->
    <div class="modal fade" id="cancelOrderModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-theme text-white border-danger shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-x-circle-fill text-danger me-2"></i>Cancel Order</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="cancelOrderId">
                    <div class="mb-3">
                        <label class="form-label text-light-muted">Reason for Cancellation</label>
                        <select class="form-select glass-input text-white" id="cancelReasonSelect" required>
                            <option value="" disabled selected>Select a reason...</option>
                            <option value="Changed my mind">Changed my mind</option>
                            <option value="Ordered by mistake">Ordered by mistake</option>
                            <option value="Long wait time">Long wait time</option>
                            <option value="Found a better price elsewhere">Found a better price elsewhere</option>
                            <option value="Other">Other (Type below)</option>
                        </select>
                    </div>
                    <div class="mb-3 d-none" id="customReasonContainer">
                        <label class="form-label text-light-muted">Please specify</label>
                        <textarea class="form-control glass-input" id="customReasonText" rows="2" placeholder="Tell us more..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-sm btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-sm btn-danger rounded-pill px-4" id="confirmCancelBtn">Confirm Cancellation</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
